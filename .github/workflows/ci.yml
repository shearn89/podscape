name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: gofmt check
        run: make fmt-check

      - name: go vet
        run: make vet

      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: go test -race
        run: go test -race -coverprofile=coverage.out ./...

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist staging
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o staging/podscape ./cmd/podscape
          archive="podscape-${VERSION}-${GOOS}-${GOARCH}.tar.gz"
          tar -czvf "dist/${archive}" -C staging podscape
          ( cd dist && sha256sum "${archive}" > "${archive}.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: podscape-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/podscape-*.tar.gz
            dist/podscape-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Sign + publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create release + upload assets
      id-token: write   # OIDC token for cosign keyless signing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: podscape-*
          merge-multiple: true

      - name: Generate aggregate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum podscape-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Sign SHA256SUMS (cosign keyless)
        working-directory: dist
        env:
          COSIGN_YES: 'true'
        run: |
          cosign sign-blob \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Verify signature (self-check)
        working-directory: dist
        run: |
          cosign verify-blob \
            --certificate SHA256SUMS.pem \
            --signature SHA256SUMS.sig \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/podscape-*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem
          generate_release_notes: true
          fail_on_unmatched_files: true
